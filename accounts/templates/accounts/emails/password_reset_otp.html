<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Reset OTP</title>
</head>
<body style="margin:0;padding:24px;background:#f4f6fb;font-family:Arial,sans-serif;color:#1a1f36;">
  <div style="max-width:560px;margin:0 auto;background:#ffffff;border:1px solid #e6e8ef;border-radius:12px;overflow:hidden;">
    <div style="padding:20px 24px;background:#0f172a;color:#ffffff;">
      <h2 style="margin:0;font-size:20px;line-height:1.4;">Project Matier Security</h2>
    </div>

    <div style="padding:24px;">
      <p style="margin:0 0 12px;font-size:15px;line-height:1.6;">Hello {{ username }},</p>
      <p style="margin:0 0 18px;font-size:15px;line-height:1.6;">Use the one-time code below to reset your password:</p>

      <div style="margin:0 0 18px;padding:14px 16px;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:10px;text-align:center;">
        <span style="font-size:30px;letter-spacing:4px;font-weight:700;color:#0f172a;">{{ otp_code }}</span>
      </div>

      <p style="margin:0 0 10px;font-size:14px;color:#334155;">This code expires in <strong>{{ otp_expire_minutes }} minutes</strong>.</p>
      <p style="margin:0;font-size:13px;color:#64748b;">If you did not request this password reset, you can safely ignore this email.</p>
    </div>
  </div>
</body>
</html>
